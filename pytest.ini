# pytest configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=blueprints
    --cov=utils
    --cov-report=html
    --cov-report=term-missing
    --ignore=tests/test_ajax_headers.py
    --ignore=tests/test_clear_decimals.py
    --ignore=tests/test_correct_url.py
    --ignore=tests/test_full_ocr.py
    --ignore=tests/test_improved_ocr.py
    --ignore=tests/test_ocr_simple.py
    --ignore=tests/test_ocr_with_csrf.py
    --ignore=tests/test_validations.py
    --ignore=tests/test_view_receipt.py
    --ignore=tests/test_with_text.py
    --ignore=tests/test_logo_invoice.py
    --ignore=tests/test_payment_receipt.py

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
